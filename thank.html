<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Sent | Ayush Babu</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#08090C;--surface:#0E1117;--line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.12);
  --text:#F2F3F6;--text2:#9BA1AE;--text3:#62687A;
  --accent:#E8A33D;--green:#3DD68C;
  --ease:cubic-bezier(0.22,1,0.36,1);
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100svh;display:flex;align-items:center;justify-content:center;
  background:var(--bg);color:var(--text);
  font-family:'Inter',system-ui,sans-serif;padding:20px;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(640px 380px at 50% 0%,rgba(232,163,61,0.06),transparent 65%);
}
.card{
  width:min(480px,94vw);
  background:var(--surface);border:1px solid var(--line);border-radius:16px;
  padding:48px 44px;text-align:center;
  box-shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px rgba(0,0,0,.35);
  animation:rise .55s var(--ease) both;
}
@keyframes rise{from{opacity:0;transform:translateY(18px)}to{opacity:1}}
.status{
  display:inline-flex;align-items:center;gap:8px;
  padding:6px 15px;border-radius:100px;margin-bottom:26px;
  background:rgba(61,214,140,0.1);border:1px solid rgba(61,214,140,0.22);
  font-size:.74rem;font-weight:600;color:var(--green);
}
.status i{width:6px;height:6px;border-radius:50%;background:var(--green)}
h1{font-size:1.7rem;font-weight:650;letter-spacing:-0.025em;margin-bottom:12px}
h1 em{font-style:normal;color:var(--accent)}
p{color:var(--text2);font-size:.92rem;line-height:1.75;max-width:340px;margin:0 auto}
p b{color:var(--text);font-weight:600}
.back{
  display:inline-flex;align-items:center;gap:8px;margin-top:30px;
  padding:13px 28px;border-radius:10px;text-decoration:none;
  background:var(--accent);color:#0F0A02;
  font-weight:600;font-size:.86rem;
  transition:all .22s var(--ease);
  box-shadow:0 1px 2px rgba(0,0,0,.35);
}
.back:hover{background:#F0B254;transform:translateY(-1px);box-shadow:0 1px 2px rgba(0,0,0,.35),0 12px 32px rgba(0,0,0,.35)}
.links{margin-top:26px;padding-top:24px;border-top:1px solid var(--line);display:flex;justify-content:center;gap:8px}
.links a{
  padding:7px 15px;border-radius:8px;border:1px solid var(--line);
  font-size:.76rem;font-weight:500;color:var(--text2);text-decoration:none;
  transition:all .2s;
}
.links a:hover{color:var(--text);border-color:var(--line2);background:rgba(255,255,255,0.03)}
</style>
</head>
<body>
<div class="card">
  <div class="status"><i></i>Message received</div>
  <h1>Thank you<em>.</em></h1>
  <p>Your message is in my inbox. Expect a response within <b>24 hours</b>.</p>
  <a class="back" href="index.html">← Back to portfolio</a>
  <div class="links">
    <a href="https://www.linkedin.com/in/ayushjaiswal2310/" target="_blank" rel="noopener">LinkedIn</a>
    <a href="https://github.com/Ayush231002" target="_blank" rel="noopener">GitHub</a>
    <a href="https://billing.elvoraglobal.in/" target="_blank" rel="noopener">Live SaaS</a>
  </div>
</div>
</body>
</html>
