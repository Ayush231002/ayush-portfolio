<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You | Ayush Babu</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at top, #0f172a, #020617);
  color: #fff;
  display: flex;
  align-items: center;
  justify-content: center;
  height: 100vh;
}

.container {
  max-width: 600px;
  padding: 50px 40px;
  border-radius: 24px;
  background: linear-gradient(145deg, rgba(255,255,255,0.04), rgba(255,255,255,0.01));
  backdrop-filter: blur(20px);
  box-shadow: 0 0 80px rgba(251,191,36,0.15);
  text-align: center;
  animation: fadeIn 0.8s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

h1 {
  font-size: 2.5rem;
  margin-bottom: 10px;
}

.highlight {
  color: #fbbf24;
}

p {
  color: #cbd5f5;
  line-height: 1.7;
  margin-bottom: 20px;
}

.btn {
  display: inline-block;
  padding: 12px 28px;
  border-radius: 999px;
  text-decoration: none;
  margin-top: 20px;
  background: linear-gradient(135deg, #f59e0b, #fbbf24);
  color: #000;
  font-weight: 600;
  transition: 0.3s;
}

.btn:hover {
  transform: translateY(-3px);
  box-shadow: 0 10px 25px rgba(251,191,36,0.4);
}

.links {
  margin-top: 20px;
  font-size: 0.9rem;
}

.links a {
  color: #94a3b8;
  margin: 0 10px;
  text-decoration: none;
}

.links a:hover {
  color: #fff;
}
</style>
</head>

<body>

<div class="container">

  <h1>🚀 Thank You, <span class="highlight">You're Noticed!</span></h1>

  <p>
    Your message has been successfully received.  
    I’ll get back to you within <span class="highlight">24 hours</span>.
  </p>

  <p>
    Meanwhile, feel free to explore my projects and see how I deliver 
    <span class="highlight">data-driven insights</span>.
  </p>

  <a href="index.html" class="btn">← Back to Portfolio</a>

  <div class="links">
    <a href="https://www.linkedin.com/in/ayushbabu">LinkedIn</a>
    <a href="https://github.com/ayushbabu">GitHub</a>
  </div>

</div>

</body>
</html>
